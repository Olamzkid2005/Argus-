name: encryption (Linux)

on:
  push:
    branches: [master, Argus-Tui]
    paths:
      - 'Argus-Tui/packages/opencode/src/argus/storage/encryption*'
      - 'Argus-Tui/packages/opencode/src/argus/storage/encrypted-*'
      - 'Argus-Tui/packages/opencode/src/argus/engagement/store.ts'
      - 'Argus-Tui/packages/opencode/test/argus/unit/encrypted-file.test.ts'
      - 'Argus-Tui/packages/opencode/test/argus/unit/encryption.test.ts'
      - 'Argus-Tui/packages/opencode/scripts/validate-encryption.ts'
      - 'Argus-Tui/packages/opencode/scripts/validate-decrypt.ts'
      - '.github/workflows/encryption-linux.yml'
  pull_request:
    branches: [master, Argus-Tui]
    paths:
      - 'Argus-Tui/packages/opencode/src/argus/storage/encryption*'
      - 'Argus-Tui/packages/opencode/src/argus/storage/encrypted-*'
      - 'Argus-Tui/packages/opencode/src/argus/engagement/store.ts'
      - 'Argus-Tui/packages/opencode/test/argus/unit/encrypted-file.test.ts'
      - 'Argus-Tui/packages/opencode/test/argus/unit/encryption.test.ts'
      - 'Argus-Tui/packages/opencode/scripts/validate-encryption.ts'
      - 'Argus-Tui/packages/opencode/scripts/validate-decrypt.ts'
      - '.github/workflows/encryption-linux.yml'
  schedule:
    - cron: '0 6 * * *'   # Nightly at 06:00 UTC — file-based fallback regression
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  BUN_INSTALL_FLAGS: --frozen-lockfile --ignore-scripts

jobs:
  encryption-linux:
    name: encryption (Linux file-based)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/encryption-linux

      - name: Run encrypted-file tests (platform-agnostic, 23 tests)
        working-directory: Argus-Tui/packages/opencode
        run: |
          bun test --timeout 60000 \
            test/argus/unit/encrypted-file.test.ts \
            --reporter=junit \
            --reporter-outfile=.artifacts/encryption-linux/encrypted-file-junit.xml \
            2>&1 | tee .artifacts/encryption-linux/encrypted-file-summary.txt

      - name: Run encryption derivation tests (pure crypto, no Keychain)
        working-directory: Argus-Tui/packages/opencode
        run: |
          bun test --timeout 60000 \
            test/argus/unit/encryption.test.ts \
            --reporter=junit \
            --reporter-outfile=.artifacts/encryption-linux/encryption-junit.xml \
            2>&1 | tee .artifacts/encryption-linux/encryption-summary.txt

      - name: Run file-based keychain validation
        working-directory: Argus-Tui/packages/opencode
        env:
          ARGUS_KEY_PASSPHRASE: "ci-test-passphrase-2024"
        shell: bash
        run: |
          set -o pipefail
          bun run scripts/validate-encryption.ts 2>&1 | \
            tee .artifacts/encryption-linux/validate-encryption.txt

      - name: Run decrypt end-to-end validation
        working-directory: Argus-Tui/packages/opencode
        env:
          ARGUS_KEY_PASSPHRASE: "ci-test-passphrase-2024"
        shell: bash
        run: |
          set -o pipefail
          bun run scripts/validate-decrypt.ts 2>&1 | \
            tee .artifacts/encryption-linux/validate-decrypt.txt

      - name: Publish encryption report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: |
            Argus-Tui/packages/opencode/.artifacts/encryption-linux/encrypted-file-junit.xml
            Argus-Tui/packages/opencode/.artifacts/encryption-linux/encryption-junit.xml
          check_name: "encryption results (Linux)"
          detailed_summary: true
          fail_on_failure: true

      - name: Check validation scripts passed
        if: always()
        working-directory: Argus-Tui/packages/opencode
        run: |
          issues=0
          # Check final summary line of validation output for "0 failed"
          if tail -1 .artifacts/encryption-linux/validate-encryption.txt | \
            grep -qE "0 failed$"; then
            echo "::debug::validate-encryption.ts passed"
          else
            echo "::warning::validate-encryption.ts reported failures"
            issues=$((issues+1))
          fi
          if tail -1 .artifacts/encryption-linux/validate-decrypt.txt | \
            grep -qE "0 failed$"; then
            echo "::debug::validate-decrypt.ts passed"
          else
            echo "::warning::validate-decrypt.ts reported failures"
            issues=$((issues+1))
          fi
          if [ "$issues" -gt 0 ]; then
            echo "One or more validation scripts reported failures (see artifacts for details)"
          else
            echo "All encryption validation scripts passed"
          fi

      - name: Upload Linux encryption artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: encryption-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: Argus-Tui/packages/opencode/.artifacts/encryption-linux/
