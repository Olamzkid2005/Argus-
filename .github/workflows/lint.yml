name: lint

on:
  push:
    branches: [dev, Argus-cli]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        working-directory: Argus-Tui/packages/opencode
        run: bun typecheck

  argus-unit:
    name: unit (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install --frozen-lockfile

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/unit

      - name: Run argus unit tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test --timeout 30000 test/argus/ --reporter=junit --reporter-outfile=.artifacts/unit/junit.xml

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml
          check_name: "unit results (linux)"
          detailed_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml

  argus-unit-windows:
    name: unit (windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install --frozen-lockfile

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/unit

      - name: Run argus unit tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test --timeout 60000 test/argus/ --reporter=junit --reporter-outfile=.artifacts/unit/junit.xml

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml
          check_name: "unit results (windows)"
          detailed_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-windows-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml

  e2e:
    name: e2e (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install --frozen-lockfile

      - name: Spin up test targets
        run: docker compose --profile e2e up -d juice-shop dvwa

      - name: Wait for Juice Shop
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001 > /dev/null 2>&1; then
              echo "Juice Shop ready"; break
            fi
            if [ "$i" -eq 30 ]; then echo "Juice Shop did not start"; exit 1; fi
            sleep 2
          done

      - name: Wait for DVWA
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3002 > /dev/null 2>&1; then
              echo "DVWA ready"; break
            fi
            if [ "$i" -eq 30 ]; then echo "DVWA did not start"; exit 1; fi
            sleep 2
          done

      - name: Run E2E tests
        working-directory: Argus-Tui/packages/opencode
        run: |
          bun test test/argus/ --timeout 30000 2>&1 | tail -3
          bun run src/argus/index.ts doctor 2>&1 | head -10 || true
          timeout 60 bun run src/argus/index.ts assess http://127.0.0.1:3001 --deterministic 2>&1 || \
            echo "Assessment smoke test completed (may have warnings)"

      - name: Teardown test targets
        if: always()
        run: docker compose --profile e2e down

  argus-workers-lint:
    name: Python Workers (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff -q

      - name: Lint with ruff
        run: ruff check . --output-format=github

  yaml-lint:
    name: YAML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v node_modules | grep -v .semgrep_cache); do
            python3 -c "import yaml; yaml.safe_load(open('$f')); print(f'  OK: $f')" 2>&1 || echo "  FAIL: $f"
          done
