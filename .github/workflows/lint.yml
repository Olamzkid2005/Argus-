name: lint

on:
  push:
    branches: [master, Argus-Tui]
  pull_request:
    branches: [master, Argus-Tui]
  schedule:
    - cron: '0 6 * * *'   # Nightly at 06:00 UTC — full fixture matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  BUN_INSTALL_FLAGS: --frozen-lockfile --ignore-scripts

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Create smoke artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/smoke

      - name: Run smoke tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test --timeout 30000 test/argus/smoke.test.ts --reporter=junit --reporter-outfile=.artifacts/smoke/junit.xml

      - name: Upload smoke test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/smoke/

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: TypeScript type check
        working-directory: Argus-Tui/packages/opencode
        run: bun typecheck

  lint-js:
    name: lint (javascript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Run oxlint
        working-directory: Argus-Tui
        run: bun lint

  argus-unit:
    name: unit (linux)
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/unit

      - name: Run argus unit tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test --timeout 30000 test/argus/ --reporter=junit --reporter-outfile=.artifacts/unit/junit.xml

      - name: Run llm unit tests
        working-directory: Argus-Tui/packages/llm
        run: bun test --timeout 30000 2>&1 | tail -10

      - name: Run effect-drizzle-sqlite unit tests
        working-directory: Argus-Tui/packages/effect-drizzle-sqlite
        run: bun test --timeout 30000 2>&1 | tail -10

      - name: Run http-recorder unit tests
        working-directory: Argus-Tui/packages/http-recorder
        run: bun test --timeout 30000 2>&1 | tail -10

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml
          check_name: "unit results (linux)"
          detailed_summary: true
          fail_on_failure: true

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml

  argus-unit-windows:
    name: unit (windows)
    needs: [typecheck]
    runs-on: windows-latest
    # Note: JUnit XML from bun test on Windows may have path-separator issues.
    # If failures appear related to path format, check bun's --reporter=junit output.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/unit

      - name: Run argus unit tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test --timeout 60000 test/argus/ --reporter=junit --reporter-outfile=.artifacts/unit/junit.xml

      - name: Run llm unit tests
        working-directory: Argus-Tui/packages/llm
        run: bun test --timeout 60000 2>&1 | tail -10

      - name: Run effect-drizzle-sqlite unit tests
        working-directory: Argus-Tui/packages/effect-drizzle-sqlite
        run: bun test --timeout 60000 2>&1 | tail -10

      - name: Run http-recorder unit tests
        working-directory: Argus-Tui/packages/http-recorder
        run: bun test --timeout 60000 2>&1 | tail -10

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml
          check_name: "unit results (windows)"
          detailed_summary: true
          fail_on_failure: true

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-windows-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/unit/junit.xml

  coverage:
    name: coverage
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Run argus tests with coverage
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/coverage && bun test --timeout 30000 test/argus/ --coverage 2>&1 | tail -30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: Argus-Tui/packages/opencode/.artifacts/coverage/

  bench:
    name: bench
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Run benchmarks
        working-directory: Argus-Tui/packages/opencode
        run: bun run bench:test
        continue-on-error: true

  e2e:
    name: e2e (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Run unit tests
        working-directory: Argus-Tui/packages/opencode
        run: bun test test/argus/ --timeout 30000 2>&1 | tail -5

      - name: Run doctor
        working-directory: Argus-Tui/packages/opencode
        run: timeout 30 bun run src/argus/main.ts doctor 2>&1 | tail -10

  argus-workers-lint:
    name: Python Workers (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff -q

      - name: Lint with ruff
        run: ruff check . --output-format=github

  python-tests:
    name: Python Workers (tests)
    needs: [argus-workers-lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpq-dev

      - name: Install test dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Run existing test suite (excluding DB/Redis/E2E)
        run: |
          python -m pytest tests/ -m "not requires_db and not requires_redis and not e2e" -v --timeout=120 --tb=long --junit-xml=python-test-results.xml 2>&1 | tee /tmp/pytest-output.txt; exit_code=${PIPESTATUS[0]}
          echo "---PYTEST EXIT CODE: $exit_code---"
          tail -100 /tmp/pytest-output.txt
          exit $exit_code

      - name: Upload python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: argus-workers/python-test-results.xml

  python-tests-full:
    name: Python Workers (DB/Redis/E2E full suite)
    # Runs on schedule (nightly) and on workflow_dispatch to avoid blocking PRs
    # on infrastructure-dependent tests. Requires PostgreSQL and Redis service containers.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: argus_test
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpq-dev

      - name: Install test dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Run DB/Redis/E2E test suite
        env:
          ARGUS_DB_URL: postgresql://argus:argus_test@localhost:5432/argus_test
          ARGUS_REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/ \
            -m "requires_db or requires_redis or e2e" \
            -v --timeout=180 --tb=long \
            --junit-xml=python-full-test-results.xml 2>&1 | tee /tmp/pytest-full-output.txt; exit_code=${PIPESTATUS[0]}
          echo "---PYTEST EXIT CODE: $exit_code---"
          tail -100 /tmp/pytest-full-output.txt
          exit $exit_code

      - name: Upload full test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-full-test-results-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: argus-workers/python-full-test-results.xml

  tool-defs-check:
    name: Tool definitions consistency check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (PyYAML)
        run: pip install pyyaml -q

      - name: Check generated tools match YAML definitions
        run: python3 scripts/generate_tool_defs.py --check

      - name: Validate tool definition alignment (Python vs TUI)
        run: python3 scripts/validate_tool_alignment.py --check

  fixture-smoke:
    name: Python Workers (fixture smoke)
    # Run independently of python-tests — fixture smoke tests verify fixture web app
    # lifecycle and should report status even if the main test suite has failures.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('argus-workers/requirements.txt', 'argus-workers/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Run fixture smoke tests (excluding those requiring the full argus CLI)
        run: |
          python -m pytest tests/test_fixture_e2e_smoke.py \
            -m smoke -v --timeout=120 --log-cli-level=INFO

  fixture-full:
    name: Python Workers (fixture full matrix)
    # No `needs:` dependency on python-tests — nightly runs should detect
    # regressions independently. If unit tests fail, we still want to know
    # whether fixture tests pass or fail.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('argus-workers/requirements.txt', 'argus-workers/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Run full fixture matrix
        run: |
          python -m pytest tests/test_fixture_comprehensive.py \
            tests/test_fixture_pipeline.py \
            tests/test_fixture_e2e_smoke.py \
            -m "full or smoke" -v --timeout=120 --log-cli-level=INFO

      - name: Upload fixture test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-full-report-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: argus-workers/reports/

  lockfile-sync:
    name: NPM lockfile sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Generate package-lock.json from Bun's node_modules
        working-directory: Argus-Tui
        run: node scripts/generate-npm-lockfile.mjs

      - name: Verify package-lock.json is in sync
        run: |
          cd Argus-Tui
          STATUS=$(git status --porcelain -- package-lock.json)
          if [[ -n "$STATUS" ]]; then
            echo "ERROR: package-lock.json is out of sync with bun.lock"
            echo "Git status: $STATUS"
            echo "Run 'cd Argus-Tui && node scripts/generate-npm-lockfile.mjs' and commit the result."
            exit 1
          fi
          echo "package-lock.json is in sync."

  yaml-lint:
    name: YAML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml -q

      - name: Validate YAML files
        run: |
          failures=0
          while IFS= read -r -d '' f; do
            if python3 -c "import yaml; yaml.safe_load(open('$f')); print(f'  OK: $f')" 2>&1; then
              :
            else
              echo "  FAIL: $f"
              failures=$((failures + 1))
            fi
          done < <(find . \( -name "*.yaml" -o -name "*.yml" \) ! -path "*/node_modules/*" ! -path "*/.semgrep_cache/*" -print0 | sort -z)
          echo "---"
          if [ "$failures" -gt 0 ]; then
            echo "YAML validation: $failures file(s) FAILED"
            exit 1
          else
            echo "All YAML files valid."
          fi
