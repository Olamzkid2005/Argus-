name: Python Workers (full suite)

on:
  push:
    branches: [master, Argus-Tui]
    paths:
      - 'argus-workers/**/*.py'
      - 'argus-workers/requirements*.txt'
      - 'argus-workers/tool_core/**'
      - '.github/workflows/python-full-suite.yml'
  pull_request:
    branches: [master, Argus-Tui]
    paths:
      - 'argus-workers/**/*.py'
      - 'argus-workers/requirements*.txt'
      - 'argus-workers/tool_core/**'
      - '.github/workflows/python-full-suite.yml'
  schedule:
    - cron: '0 6 * * 0'   # Weekly at 06:00 UTC Sunday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  full-suite:
    name: full-suite (ubuntu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: argus-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpq-dev libnss3 libnspr4 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('argus-workers/requirements.txt', 'argus-workers/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Install Playwright with Chromium browser
        run: |
          pip install playwright -q
          python -m playwright install chromium
          echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> $GITHUB_ENV

      - name: Verify Python version compat
        run: |
          python --version
          python -c "from tool_core._compat import StrEnum, NotRequired, utc; print('Compat shims OK')"

      - name: Verify Playwright browser
        run: |
          python -c "
from playwright.sync_api import sync_playwright
with sync_playwright() as p:
    browser = p.chromium.launch(headless=True)
    print(f'Chromium version: {browser.version}')
    browser.close()
"

      - name: Run full test suite (excluding DB/Redis-dependent tests)
        run: |
          python -m pytest tests/ \
            -m "not requires_db and not requires_redis" \
            -v --timeout=180 --tb=long -ra \
            --junit-xml=python-full-suite-results.xml \
            2>&1 | tee /tmp/pytest-output.txt
          echo "---PYTEST EXIT CODE: ${PIPESTATUS[0]}---"
          tail -20 /tmp/pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload full suite results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-full-suite-results-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: argus-workers/python-full-suite-results.xml

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: /tmp/pytest-output.txt
