name: encryption (macOS)

on:
  push:
    branches: [master, Argus-Tui]
    paths:
      - 'Argus-Tui/packages/opencode/src/argus/storage/encryption*'
      - 'Argus-Tui/packages/opencode/src/argus/storage/encrypted-*'
      - 'Argus-Tui/packages/opencode/src/argus/engagement/store.ts'
      - 'Argus-Tui/packages/opencode/test/argus/**/encrypt*.test.ts'
      - '.github/workflows/encryption-macos.yml'
  pull_request:
    branches: [master, Argus-Tui]
    paths:
      - 'Argus-Tui/packages/opencode/src/argus/storage/encryption*'
      - 'Argus-Tui/packages/opencode/src/argus/storage/encrypted-*'
      - 'Argus-Tui/packages/opencode/src/argus/engagement/store.ts'
      - 'Argus-Tui/packages/opencode/test/argus/**/encrypt*.test.ts'
      - '.github/workflows/encryption-macos.yml'
  schedule:
    - cron: '0 6 * * *'   # Nightly at 06:00 UTC — full encryption regression
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  BUN_INSTALL_FLAGS: --frozen-lockfile --ignore-scripts

jobs:
  encryption-macos:
    name: encryption (macOS Keychain)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: Argus-Tui
        run: bun install ${{ env.BUN_INSTALL_FLAGS }}

      - name: Create artifacts directory
        working-directory: Argus-Tui/packages/opencode
        run: mkdir -p .artifacts/encryption-macos

      - name: Run encryption unit tests (Keychain + derivation + file + DB)
        working-directory: Argus-Tui/packages/opencode
        run: |
          bun test --timeout 120000 \
            test/argus/unit/encryption.test.ts \
            test/argus/unit/encrypted-db.test.ts \
            test/argus/unit/encrypted-file.test.ts \
            --reporter=junit \
            --reporter-outfile=.artifacts/encryption-macos/unit-junit.xml \
            2>&1 | tee .artifacts/encryption-macos/unit-summary.txt

      - name: Run encryption integration tests (EngagementStore + EncryptedDbHandle)
        working-directory: Argus-Tui/packages/opencode
        run: |
          bun test --timeout 120000 \
            test/argus/integration/encryption-workflow.test.ts \
            --reporter=junit \
            --reporter-outfile=.artifacts/encryption-macos/integration-junit.xml \
            2>&1 | tee .artifacts/encryption-macos/integration-summary.txt

      - name: Publish unit report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: |
            Argus-Tui/packages/opencode/.artifacts/encryption-macos/unit-junit.xml
            Argus-Tui/packages/opencode/.artifacts/encryption-macos/integration-junit.xml
          check_name: "encryption results (macOS)"
          detailed_summary: true
          fail_on_failure: true

      - name: Upload encryption artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: encryption-macos-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: Argus-Tui/packages/opencode/.artifacts/encryption-macos/
