rules:
- id: br_takeover_github_pages
  message: Potential GitHub Pages subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - github-pages
  - bugbounty
  - dns
  requires_validation: true
  patterns:
  - regex: (?i)There isn't a GitHub Pages site here
  metadata:
    category: subdomain-takeover
    confidence: 0.8
    detection_method: Create GitHub Pages repo matching the CNAME — claim the subdomain
  test_patterns:
  - There isn't a GitHub Pages site here.
  non_matching_patterns:
  - GitHub Pages site successfully deployed
- id: br_takeover_heroku
  message: Potential Heroku subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - heroku
  - bugbounty
  requires_validation: true
  patterns:
  - regex: (?i)No such app
  metadata:
    category: subdomain-takeover
    confidence: 0.8
    detection_method: heroku create <appname> matching the CNAME
  test_patterns:
  - No such app.
  non_matching_patterns:
  - No search results found.
- id: br_takeover_aws_s3
  message: Potential AWS S3 bucket subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - aws-s3
  - bugbounty
  requires_validation: true
  patterns:
  - regex: (?i)(NoSuchBucket|The specified bucket does not exist)
  metadata:
    category: subdomain-takeover
    confidence: 0.8
    detection_method: aws s3api create-bucket --bucket <name> matching CNAME
  test_patterns:
  - 'NoSuchBucket: The specified bucket does not exist'
  non_matching_patterns:
  - Bucket contents listed below
- id: br_takeover_azure
  message: Potential Azure subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - azure
  - bugbounty
  requires_validation: true
  patterns:
  - regex: (?i)404 Web Site not found
  metadata:
    category: subdomain-takeover
    confidence: 0.75
    detection_method: Create Azure Web App with custom domain matching CNAME
  test_patterns:
  - 404 Web Site not found.
  non_matching_patterns:
  - 404 Page not found
- id: br_takeover_netlify
  message: Potential Netlify subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - netlify
  - bugbounty
  requires_validation: true
  patterns:
  - regex: '(?i)Not Found - Request ID:'
  metadata:
    category: subdomain-takeover
    confidence: 0.75
    detection_method: Add custom domain to new Netlify site matching CNAME
  test_patterns:
  - 'Not Found - Request ID: abc123-def456'
  non_matching_patterns:
  - Not Found
- id: br_takeover_vercel
  message: Potential Vercel subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - vercel
  - bugbounty
  requires_validation: true
  patterns:
  - regex: (?i)The deployment could not be found
  metadata:
    category: subdomain-takeover
    confidence: 0.75
    detection_method: Deploy matching project on Vercel with the custom domain
  test_patterns:
  - The deployment could not be found.
  non_matching_patterns:
  - Deployment completed successfully
- id: br_takeover_fastly
  message: Potential Fastly subdomain takeover — matching service fingerprint
  severity: HIGH
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - fastly
  - bugbounty
  requires_validation: true
  patterns:
  - regex: '(?i)Fastly error: unknown domain'
  metadata:
    category: subdomain-takeover
    confidence: 0.7
    detection_method: Create Fastly service with matching domain
  test_patterns:
  - 'Fastly error: unknown domain: example.com'
  non_matching_patterns:
  - 'Fastly error: 503 Service Unavailable'
- id: br_takeover_shopify
  message: Potential Shopify subdomain takeover — matching service fingerprint
  severity: MEDIUM
  source: bugbounty
  cwe: CWE-350
  tags:
  - subdomain-takeover
  - shopify
  - bugbounty
  requires_validation: true
  patterns:
  - regex: (?i)Sorry, this shop is currently unavailable
  test_patterns:
  - Sorry, this shop is currently unavailable.
  non_matching_patterns:
  - Sorry, this item is out of stock
  metadata:
    category: subdomain-takeover
    confidence: 0.7
    detection_method: Create Shopify store matching the subdomain name
