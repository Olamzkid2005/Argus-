rules:
  - id: hardcoded-stripe-secret-key
    severity: ERROR
    languages: [python, javascript, typescript, java, go, ruby, php]
    message: >-
      Hardcoded Stripe secret key detected. This key provides full access to your Stripe account.
      Rotate this key immediately and remove it from source code.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern-regex: "(sk_live_|rk_live_)[a-zA-Z0-9]{20,}"
      - pattern-regex: "STRIPE_SECRET_KEY\\s*=\\s*[\"']sk_live_"
      - pattern-regex: "stripe\\.apiKey\\s*=\\s*[\"']sk_live_"
      - pattern-regex: "OPENAI_API_KEY\\s*=\\s*[\"']sk-"
      - pattern: process.env.STRIPE_SECRET_KEY

  - id: hardcoded-aws-credentials
    severity: ERROR
    languages: [python, javascript, typescript, java, go, ruby, php]
    message: >-
      Hardcoded AWS access key detected. This key provides access to your AWS account.
      Rotate immediately and use IAM roles or environment variables instead.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern-regex: "(AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}"
      - pattern-regex: "AWS_ACCESS_KEY_ID\\s*=\\s*[\"']AKIA"
      - pattern-regex: "aws_access_key_id\\s*=\\s*[\"']AKIA"
      - pattern-regex: "AWS_SECRET_ACCESS_KEY\\s*=\\s*[\"']"
      - pattern-regex: "aws_secret_access_key\\s*=\\s*[\"']"

  - id: hardcoded-jwt-secret
    severity: ERROR
    languages: [python, javascript, typescript]
    message: >-
      Hardcoded JWT secret detected. Use environment variables and validate at startup.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern-regex: "JWT_SECRET\\s*=\\s*[\"'][^\"']+[\"']"
      - pattern-regex: "jwtSecret\\s*=\\s*[\"'][^\"']+[\"']"
      - pattern: process.env.JWT_SECRET

  - id: hardcoded-database-password
    severity: ERROR
    languages: [python, javascript, typescript, java, go, ruby, php]
    message: >-
      Hardcoded database password detected. Use environment variables or secrets manager.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern-regex: "postgresql://[^:]+:[^@]+@"
      - pattern-regex: "mysql://[^:]+:[^@]+@"
      - pattern-regex: "mongodb(\\+srv)?://[^:]+:[^@]+@"
      - pattern-regex: "DATABASE_PASSWORD\\s*=\\s*[\"'][^\"']+[\"']"
      - pattern-regex: "DB_PASSWORD\\s*=\\s*[\"'][^\"']+[\"']"

  - id: hardcoded-private-key
    severity: ERROR
    languages: [python, javascript, typescript]
    message: >-
      Private key (RSA/EC/SSH) hardcoded in source. This compromises all communications.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern-regex: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
      - pattern-regex: "PRIVATE_KEY\\s*=\\s*[\"']-----BEGIN"

  - id: hardcoded-github-token
    severity: ERROR
    languages: [python, javascript, typescript]
    message: >-
      GitHub token detected. Rotate immediately - attackers search GitHub for "ghp_" tokens.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: HIGH
    pattern-regex: "(ghp_|gh_[a-zA-Z0-9]{36,})"

  - id: hardcoded-api-key-generic
    severity: WARNING
    languages: [python, javascript, typescript, java, go, ruby, php]
    message: >-
      Possible hardcoded API key detected. Use environment variables instead.
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2021-Cryptographic Failures"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern-regex: "(api[_-]?key|apikey)\\s*[=:]\\s*[\"'][a-zA-Z0-9_-]{20,}[\"']"
      - pattern: process.env.$KEY
