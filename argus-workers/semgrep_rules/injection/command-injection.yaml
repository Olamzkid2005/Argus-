rules:
  - id: command-injection-os-system
    severity: ERROR
    languages: [python]
    message: >-
      os.system with user input allows command injection. Use subprocess with shell=False.
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021-Injection"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: os.system($VAR)
      - pattern: os.system(f"...{$VAR}...")
      - pattern: os.system("..." + $VAR)

  - id: command-injection-subprocess-shell
    severity: ERROR
    languages: [python]
    message: >-
      subprocess with shell=True and variable input allows command injection.
      Use shell=False with list arguments.
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021-Injection"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: subprocess.call($CMD, shell=True)
      - pattern: subprocess.Popen($CMD, shell=True)
      - pattern: subprocess.run($CMD, shell=True)
      - pattern: subprocess.check_output($CMD, shell=True)
      - pattern: os.popen($CMD)

  - id: command-injection-child-process
    severity: ERROR
    languages: [javascript, typescript]
    message: >-
      child_process.exec with user input allows command injection.
      Use execFile or spawn with argument arrays.
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021-Injection"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: require("child_process").exec($VAR)
      - pattern: require("child_process").execSync($VAR)
      - pattern: |
          child_process.exec($INPUT, ...)
      - pattern: |
          $MOD.exec($INPUT, ...)

  - id: command-injection-php
    severity: ERROR
    languages: [php]
    message: >-
      PHP execution functions with user input allow command injection.
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021-Injection"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: system($VAR)
      - pattern: exec($VAR)
      - pattern: passthru($VAR)
      - pattern: shell_exec($VAR)
      - pattern: proc_open($VAR)