rules:
  - id: php-sqli-mysql
    pattern: mysql_query($VAR)
    message: SQL injection risk - direct mysql_query with unsanitized variable
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-89"
      owasp: "A1"

  - id: php-sqli-mysqli
    pattern: mysqli_query($DB, $QUERY)
    message: SQL injection risk - direct mysqli_query with unsanitized input
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-89"
      owasp: "A1"

  - id: php-sqli-pdo
    pattern: $PDO->query($QUERY)
    message: SQL injection risk - PDO query with unsanitized input
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-89"
      owasp: "A1"

  - id: php-sqli-concat-superglobal
    pattern-either:
      - pattern: mysql_query($X . $_GET)
      - pattern: mysql_query($X . $_POST)
      - pattern: mysqli_query($DB, $X . $_GET)
      - pattern: mysqli_query($DB, $X . $_POST)
      - pattern: $DB->query($X . $_GET)
      - pattern: $DB->query($X . $_POST)
      - pattern: $DB->prepare($X . $_GET)
      - pattern: $DB->prepare($X . $_POST)
    message: SQL injection risk - query string built with concatenated superglobal
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-89"
      owasp: "A1"
