name: playwright-bola
command: python3
args:
  - argus-workers/tools/scripts/playwright_bola.py
description: Broken Object Level Authorization detection via browser automation
parameters:
  - name: target
    flag: --target
    type: string
    required: true
    description: Target URL
  - name: creds_file
    flag: --creds-file
    type: string
    required: false
    description: Path to JSON credentials file with attacker/victim credentials (alternative to --attacker-username/--attacker-password and --victim-username/--victim-password)
  - name: attacker-username
    flag: --attacker-username
    type: string
    required: false
    description: Attacker username (not required when --creds-file is provided)
  - name: attacker-password
    flag: --attacker-password
    type: string
    required: false
    description: Attacker password (not required when --creds-file is provided)
  - name: victim-username
    flag: --victim-username
    type: string
    required: false
    description: Victim username (not required when --creds-file is provided)
  - name: victim-password
    flag: --victim-password
    type: string
    required: false
    description: Victim password (not required when --creds-file is provided)
  - name: resource-pattern
    flag: --resource-pattern
    type: string
    required: false
    default: "/api/users/{username}/details"
    description: URL pattern for victim resource (use {username} placeholder)
  - name: username-selector
    flag: --username-selector
    type: string
    required: false
    default: "input[name=username]"
    description: CSS selector for username input field
  - name: password-selector
    flag: --password-selector
    type: string
    required: false
    default: "input[name=password]"
    description: CSS selector for password input field
  - name: submit-selector
    flag: --submit-selector
    type: string
    required: false
    default: "button[type=submit]"
    description: CSS selector for submit button
capabilities:
  - browser_verification
signal_quality: CONFIRMED
timeout: 120
enabled: true
requires:
  target_scheme:
    - http
    - https
  credentials: true
credential_roles:
  - attacker
  - victim
priority: 80
cost: medium
risk_level: low
