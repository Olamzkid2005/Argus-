name: "wpscan"
command: "wpscan"
description: "WordPress vulnerability scanner"
args: ["-f", "json", "--no-banner"]
enabled: true
timeout: 600
parameters:
  - name: "target"
    type: "string"
    description: "WordPress URL"
    flag: "--url"
    required: true
  - name: "api_token"
    type: "string"
    description: "WPScan API token"
    flag: "--api-token"
  - name: "enumerate"
    type: "string"
    description: "Enumeration options"
    flag: "--enumerate"
