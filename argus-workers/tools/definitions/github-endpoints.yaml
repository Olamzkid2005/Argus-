name: github-endpoints
command: github-endpoints
description: "Enumerate GitHub repositories and exposed endpoints for a target"
args:
  - "--json"
parameters:
  - name: target
    type: string
    description: "Target organization or domain"
    required: true
capabilities:
  - web_recon
signal_quality: CANDIDATE
priority: 30
cost: low
enabled: true
timeout: 180
