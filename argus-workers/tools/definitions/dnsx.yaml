name: dnsx
command: dnsx
description: "Fast DNS resolver and probe tool"
args:
  - "-json"
  - "-silent"
parameters:
  - name: target
    type: string
    description: "Domain or subdomain list"
    required: true
    flag: "-d"
capabilities:
  - web_recon
signal_quality: CANDIDATE
priority: 40
cost: low
enabled: true
timeout: 120
