name: testssl
command: testssl
description: "TLS/SSL security testing tool"
args:
  - "--quiet"
  - "--mode"
  - "parallel"
parameters:
  - name: target
    type: string
    description: "Target host:port"
    required: true
  - name: jsonfile
    type: string
    description: "Write JSON findings to file (use '-'' for stdout)"
    required: false
    flag: "--jsonfile"
capabilities:
  - vulnerability_scanning
signal_quality: CANDIDATE
risk_level: medium
requires:
  target_scheme: "https"
priority: 60
cost: medium
enabled: true
timeout: 300
