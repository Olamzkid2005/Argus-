name: attack_surface_mapper
command: python3
args:
  - argus-workers/tools/run_agent_tool.py
  - attack_surface_mapper
description: "attack_surface_mapper - security assessment tool"
parameters:
  - name: target
    type: string
    description: "Target URL or scope"
    required: true
    flag: "--target"
  - name: extra
    type: string
    description: 'JSON-encoded extra parameters (e.g. {"tech_stack":["apache"]})'
    required: false
capabilities:
  - security_analysis
  - web_recon
signal_quality: CONFIRMED
priority: 90
cost: low
enabled: true
timeout: 300
