name: playwright-xss
command: python3
args:
  - argus-workers/tools/scripts/playwright_xss.py
description: Stored Cross-Site Scripting detection via browser automation
parameters:
  - name: target
    flag: --target
    type: string
    required: true
    description: Target URL
  - name: creds_file
    flag: --creds-file
    type: string
    required: false
    description: Path to JSON credentials file with login credentials (alternative to --username/--password)
  - name: username
    flag: --username
    type: string
    required: false
    description: Login username (not required when --creds-file is provided)
  - name: password
    flag: --password
    type: string
    required: false
    description: Login password (not required when --creds-file is provided)
  - name: form-page
    flag: --form-page
    type: string
    required: false
    default: /feedback
    description: Path to the form page (default /feedback)
  - name: payload
    flag: --payload
    type: string
    required: false
    description: XSS payload to inject
  - name: username-selector
    flag: --username-selector
    type: string
    required: false
    default: "input[name=username]"
    description: CSS selector for username input field
  - name: password-selector
    flag: --password-selector
    type: string
    required: false
    default: "input[name=password]"
    description: CSS selector for password input field
  - name: submit-selector
    flag: --submit-selector
    type: string
    required: false
    default: "button[type=submit]"
    description: CSS selector for submit button
capabilities:
  - browser_verification
signal_quality: CONFIRMED
timeout: 120
enabled: true
requires:
  target_scheme:
    - http
    - https
  credentials: true
credential_roles:
  - default
priority: 80
cost: medium
risk_level: low
