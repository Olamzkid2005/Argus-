name: "gospider"
command: "gospider"
description: "Web spider for endpoint discovery"
args: ["-q", "-j"]
enabled: true
timeout: 300
parameters:
  - name: "target"
    type: "string"
    description: "Target URL"
    flag: "-s"
    required: true
  - name: "depth"
    type: "number"
    description: "Crawl depth"
    flag: "-d"
    default: 3
