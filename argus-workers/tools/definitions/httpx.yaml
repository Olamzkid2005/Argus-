name: httpx
command: httpx
description: "HTTPX probe for HTTP server discovery and technology detection"
args:
  - "-json"
  - "-silent"
parameters:
  - name: target
    type: string
    description: "Target URL or host to probe"
    required: true
    flag: "-u"
capabilities:
  - http_probe
  - web_recon
signal_quality: CANDIDATE
priority: 80
cost: low
enabled: true
timeout: 120
