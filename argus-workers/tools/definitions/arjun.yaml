name: "arjun"
command: "arjun"
description: "HTTP parameter discovery"
args: ["-m", "GET"]
enabled: true
timeout: 300
parameters:
  - name: "target"
    type: "string"
    description: "Target URL"
    flag: "-u"
    required: true
  - name: "threads"
    type: "number"
    description: "Number of threads"
    flag: "-t"
    default: 10
