name: gosec
command: gosec
description: "Go security code scanner"
args:
  - "-fmt=json"
  - "-quiet"
parameters:
  - name: target
    type: string
    description: "Target Go package path"
    required: true
capabilities:
  - vulnerability_scanning
  - sast
signal_quality: PROBABLE
risk_level: low
requires:
  tech_contains:
    - go
priority: 65
cost: medium
enabled: true
timeout: 600
