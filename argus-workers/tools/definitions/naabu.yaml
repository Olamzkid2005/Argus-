name: "naabu"
command: "naabu"
description: "Port scanning tool"
args: ["-json"]
enabled: true
timeout: 300
parameters:
  - name: "target"
    type: "string"
    description: "Target host"
    flag: "-host"
    required: true
  - name: "top_ports"
    type: "string"
    description: "Top ports to scan"
    flag: "-top-ports"
  - name: "port_range"
    type: "string"
    description: "Port range"
    flag: "-p"
