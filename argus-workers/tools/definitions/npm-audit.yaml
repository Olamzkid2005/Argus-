name: npm-audit
command: npm
description: "Node.js dependency vulnerability scanner"
args:
  - "audit"
  - "--json"
parameters:
  - name: target
    type: string
    description: "Target project directory (must contain package.json)"
    required: false
capabilities:
  - vulnerability_scanning
signal_quality: CANDIDATE
requires:
  tech_contains:
    - javascript
    - typescript
priority: 50
cost: low
enabled: true
timeout: 300
