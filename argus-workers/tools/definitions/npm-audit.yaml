name: npm-audit
command: npm
description: "Node.js dependency vulnerability scanner"
args:
  - "audit"
  - "--json"
parameters:
  - name: target
    type: string
    description: "Target project directory (must contain package.json)"
    required: true
capabilities:
  - sca
signal_quality: CANDIDATE
risk_level: low
requires:
  tech_contains:
    - javascript
    - typescript
priority: 50
cost: low
enabled: true
timeout: 300
