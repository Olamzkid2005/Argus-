name: "alterx"
command: "alterx"
description: "Subdomain permutation generator"
args: ["-silent"]
enabled: true
timeout: 120
parameters:
  - name: "target"
    type: "string"
    description: "Input subdomains (pipe via stdin)"
  - name: "domain"
    type: "string"
    description: "Root domain"
    flag: "-d"
