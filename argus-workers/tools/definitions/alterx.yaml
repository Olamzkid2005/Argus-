name: alterx
command: alterx
description: "Subdomain permutation generator for expanding recon surface"
args:
  - "-silent"
parameters:
  - name: target
    type: string
    description: "Root domain to generate permutations for"
    required: true
    flag: "-d"
capabilities:
  - web_recon
signal_quality: CANDIDATE
risk_level: low
priority: 30
cost: low
enabled: true
timeout: 120
