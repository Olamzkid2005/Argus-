name: "ffuf"
command: "ffuf"
description: "Web fuzzing tool"
args: ["-json"]
enabled: true
timeout: 300
parameters:
  - name: "target"
    type: "string"
    description: "Target URL with FUZZ keyword"
    flag: "-u"
    required: true
  - name: "wordlist"
    type: "string"
    description: "Path to wordlist"
    flag: "-w"
    required: true
  - name: "threads"
    type: "number"
    description: "Number of threads"
    flag: "-t"
    default: 40
  - name: "match_condition"
    type: "string"
    description: "Match condition"
    flag: "-mc"
