name: whatweb
command: whatweb
description: "WhatWeb technology detection and fingerprinting"
args:
  - "--color=never"
  - "--log-json=/dev/stdout"
parameters:
  - name: target
    type: string
    description: "Target URL to fingerprint"
    required: true
capabilities:
  - technology_detection
signal_quality: CANDIDATE
risk_level: low
priority: 75
cost: low
enabled: true
timeout: 120
