services:
  # ── E2E Test Targets (Task 4.3) ──
  juice-shop:
    image: bkimminich/juice-shop:v17.1.1
    ports:
      - "127.0.0.1:3001:3000"
    profiles: ["e2e"]
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa:v1.9
    ports:
      - "127.0.0.1:3002:80"
    profiles: ["e2e"]
    restart: unless-stopped

  # PostgreSQL 16 with pgvector for similarity search
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus_user}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: ${POSTGRES_DB:-argus_pentest}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./argus-workers/database/init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./argus-workers/database/init/02-audit.sql:/docker-entrypoint-initdb.d/02-audit.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus_user} -d ${POSTGRES_DB:-argus_pentest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID

  # Redis 7 for Celery broker, caching, and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN

  # Next.js platform (frontend + API)
  # Platform service temporarily removed — argus-platform/ directory was removed
  # during v5 migration. Re-add when Next.js platform is rebuilt.
  # platform:
  #   build:
  #     context: ./argus-platform
  #     dockerfile: Dockerfile
  #   ports:
  #     - "127.0.0.1:3000:3000"
  #   ...

  # Celery worker (distributed scan tasks)
  worker:
    build:
      context: ./argus-workers
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW       # Required for nmap SYN scans from within container

  # Celery Beat (scheduled tasks)
  celery-beat:
    build:
      context: ./argus-workers
      dockerfile: Dockerfile
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW       # Required for nmap SYN scans from within container

volumes:
  postgres_data:
  redis_data:
