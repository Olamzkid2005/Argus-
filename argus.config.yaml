# Argus V5 Project Configuration
# Per-repo config that can be committed to version control.
# Precedence: CLI flags > Environment > Project config > User config > Defaults
# Feature flags all default to false — enable explicitly.

features:
  workflow_registry: true
  engagement_store: true
  approval_gates: true
  llm_finding_analysis: true

evidence:
  retention_days: 30
  max_engagement_size_mb: 500
  capture_threshold: HIGH

storage:
  encryption:
    enabled: true  # Encrypt engagement databases at rest (key auto-generated on first use if missing)

security:
  allowed_git_hosts: []
  # Target scope enforcement — hard technical guardrails preventing scans
  # against unauthorized targets. When allowed_targets is non-empty, only
  # matching targets will be scanned. When blocked_targets is non-empty,
  # matching targets are always rejected (takes precedence over allowed).
  # Glob patterns: *.example.com, example.*, * (all), or exact hostnames.
  scope:
    mode: warn  # "warn" | "allowlist" | "open" (default: warn)
    #
    # Autonomous mode (ARGUS_AUTONOMOUS=1) REQUIREMENT:
    # When running autonomously, scope.mode MUST be set to 'allowlist'.
    # If mode is 'warn' or 'open' in autonomous mode, the runner will
    # throw a hard error before any phase executes (mirrors blockers
    # #13/#23/#28 pattern). You must also configure allowed_targets.
    #
    # Safe example for autonomous use:
    #   scope:
    #     mode: allowlist
    #     allowed_targets:
    #       - "*.example.com"
    #       - "api.example.com"
    allowed_targets: []
    blocked_targets: []
    # require_confirmation: false  # Ask before scanning new targets
    git_host_policy: allowlist  # "allowlist" | "allow_all"
    allowed_git_hosts: []       # Additional hosts beyond the curated default list

rate_limiting:
  per_host_requests_per_second: 10  # 0 = disabled

tools:
  enabled: []
  disabled: []  # No tools pre-disabled by default
  paths: {}
  timeouts: {}
  circuit_breaker:
    max_failures: 8
    cooldown_ms: 120000
