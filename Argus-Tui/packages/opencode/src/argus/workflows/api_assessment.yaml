name: api_assessment
label: API Security Assessment
version: 1
phases:
  - name: recon
    required_capabilities:
      - web_recon
      - technology_detection
    execution: parallel
    error_recovery: retry_once_then_skip

  - name: auth_detection
    required_capabilities:
      - auth_detection
      - credential_analysis
    execution: sequential
    error_recovery: skip_and_continue
    approval_gate: auth_testing

  - name: api_discovery
    required_capabilities:
      - content_discovery
      - api_probing
    execution: parallel
    error_recovery: skip_and_continue

  - name: bola_testing
    required_capabilities:
      - vulnerability_scanning
      - http_probe
    execution: sequential
    error_recovery: skip_and_continue
    approval_gate: privilege_escalation

  - name: verification
    required_capabilities:
      - browser_verification
    execution: sequential
    error_recovery: skip_and_continue

  - name: reporting
    required_capabilities:
      - report_generation
    execution: sequential
    error_recovery: skip_and_continue

approval_required:
  destructive_tools: true
  auth_testing: false
  privilege_escalation: true
