tools:
  - name: nuclei
    label: Nuclei Vulnerability Scanner
    capabilities:
      - vulnerability_scanning
      - template_scanning
    requires_auth: false
    destructive: false
    supports_api: true
    supports_web: true
    timeout_seconds: 300
    min_version: "3.0.0"
    version_cmd: "nuclei --version"
    version_regex: "\\d+\\.\\d+\\.\\d+"
    scoring:
      confidence_score: 90
      coverage_score: 85

  - name: nikto
    label: Nikto Web Scanner
