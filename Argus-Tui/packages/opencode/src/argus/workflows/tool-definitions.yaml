# TypeScript-side tool definitions for the Argus planner.
# INTENTIONALLY SEPARATE from the Python-side definitions in
# argus-workers/tool_definitions.py (different schema, different purpose).
# Python side: execution metadata (phases, params, commands, timeouts, signal quality)
# TS side (this file): planning metadata (capabilities, scoring, consumes/provides, auth gating)
#
# When adding a tool here, also add its execution metadata to:
#   argus-workers/tools/definitions/<tool>.yaml


tools:
  - name: nuclei
    label: Nuclei Vulnerability Scanner
    capabilities:
      - vulnerability_scanning
      - template_scanning
      - graphql_assessment
      - api_docs_analysis
    requires_auth: false
    destructive: false
    supports_api: true
    supports_web: true
    timeout_seconds: 300
    min_version: "3.0.0"
    version_cmd: "nuclei --version"
    version_regex: "\\d+\\.\\d+\\.\\d+"
    consumes: [live_hosts, tech_stack]
    provides: [vulnerabilities]
    scoring:
      confidence_score: 90
      coverage_score: 85
    cost: medium

  - name: nikto
    label: Nikto Web Scanner
    capabilities:
      - web_recon
