name: quick_scan
label: Quick Passive Scan
version: 1
phases:
  - name: recon
    required_capabilities:
      - web_recon
      - technology_detection
      - http_probe
    execution: parallel
    error_recovery: skip_and_continue

  - name: vuln_scan
    required_capabilities:
      - vulnerability_scanning
    execution: parallel
    error_recovery: skip_and_continue

  - name: reporting
    required_capabilities:
      - report_generation
    execution: sequential
    error_recovery: skip_and_continue

approval_required:
  destructive_tools: false
  auth_testing: false
  privilege_escalation: false
